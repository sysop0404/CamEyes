; CamEyes - ESP32-S3-CAM Firmware
; PlatformIO 설정

[env:esp32s3cam]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; ESP32-S3 N16R8 설정
board_build.arduino.memory_type = qio_opi
board_build.partitions = huge_app.csv
board_build.flash_size = 16MB

; PSRAM 활성화 (OPI 8MB)
build_flags =
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_MODE_OPI
    -DCONFIG_SPIRAM_SPEED_80M
    -DCAM_NODE                    ; 카메라 노드 식별자

; 시리얼 모니터
monitor_speed = 115200

; 라이브러리
lib_deps =
    ; WiFi, WebServer는 ESP32 코어에 내장
