# ============================================================
# CamEyes Configuration
# ============================================================
# 카메라 IP, 해상도 등은 하드웨어 셋업 후 수정

project:
  name: CamEyes
  version: 0.1.0
  mode: stereo  # stereo | mono

# ------------------------------------------------------------
# 카메라 설정
# ------------------------------------------------------------
cameras:
  - id: cam_left
    role: front_left          # 스테레오 좌측
    ip: 192.168.4.2           # ESP32-S3 기본 AP 또는 STA IP
    stream_url: "http://{ip}:81/stream"
    resolution: [640, 480]    # VGA
    fps: 10
    jpeg_quality: 80          # 1-100 (높을수록 화질 좋고 대역폭 큼)

  - id: cam_right
    role: front_right         # 스테레오 우측
    ip: 192.168.4.3
    stream_url: "http://{ip}:81/stream"
    resolution: [640, 480]
    fps: 10
    jpeg_quality: 80

# 향후 카메라 추가 시 아래에 추가
#  - id: cam_rear
#    role: rear
#    ip: 192.168.4.4
#    ...

# ------------------------------------------------------------
# 스테레오 설정
# ------------------------------------------------------------
stereo:
  baseline_mm: 100.0          # 카메라 간 거리 (mm)
  pair: [cam_left, cam_right]

# ------------------------------------------------------------
# IMU 설정
# ------------------------------------------------------------
imu:
  enabled: true
  type: MPU9250              # MPU9250 / MPU6050 / MPU6500
  i2c_address: 0x68
  sample_rate_hz: 200
  udp_port: 9000             # PC에서 수신할 UDP 포트
  use_magnetometer: false    # 실내에서는 false 권장

# ------------------------------------------------------------
# WiFi 설정
# ------------------------------------------------------------
wifi:
  mode: STA                  # AP (카메라가 AP) | STA (공유기에 접속)
  ssid: "CamEyes_Net"        # STA 모드 시 공유기 SSID
  password: ""               # STA 모드 시 비밀번호
  channel: 6                 # AP 모드 시 채널

# ------------------------------------------------------------
# SLAM 설정
# ------------------------------------------------------------
slam:
  enabled: false             # Phase 3에서 활성화
  method: orbslam3           # orbslam3 | openvins | rtabmap
  vocabulary_path: ""        # ORB-SLAM3 vocabulary 파일 경로

# ------------------------------------------------------------
# 캘리브레이션
# ------------------------------------------------------------
calibration:
  board_type: charuco        # charuco | checkerboard
  charuco:
    squares_x: 5
    squares_y: 7
    square_length_mm: 30.0
    marker_length_mm: 22.5
    dictionary: DICT_4X4_50
  data_dir: "src/data/calibration"      # 프로젝트 루트 기준
  min_captures: 20           # 최소 캡처 수

# ------------------------------------------------------------
# 시각화
# ------------------------------------------------------------
visualization:
  show_streams: true         # 카메라 스트림 표시
  show_depth: false          # 스테레오 깊이맵 표시 (Phase 3)
  show_3d: false             # 3D 포인트클라우드 표시 (Phase 3)
  window_scale: 0.75         # 표시 창 크기 비율

# ------------------------------------------------------------
# 녹화/저장
# ------------------------------------------------------------
recording:
  enabled: false
  output_dir: "src/data/sessions"       # 프로젝트 루트 기준
  save_raw_frames: false     # true 시 디스크 사용량 주의
  save_calibration: true
